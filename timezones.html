        <script>

            var names = [    
                "Blasket Sound Meridian",
                "Dursey Head Meridian",
                "Knockgour Meridian",
                "Crookhaven Meridian",
                "Calf Island Meridian",
                "Skibberren Meridian",
                "Newmills Meridia",
                "Lislevane Meridian",
                "Kinsale Meridian",
                "Roches Point Meridian",
                "Ballycotton Meridian",
                "Ardmore Meridian",
                "Ballyvoyle Meridian",
                "Dunhill Meridian",
                "Dunmore East Meridian",
                "Wellingtonbridge Meridian",
                "St. Georges Bay Meridian", 
                "Kilmuckridge Meridian",
                "Wickwolow Meridian",
                "Belfast Meridian",
                "Irish Sea Meridian",
                "Celtic Sea Meridia",
                "Skomer Island Meridia",
                "Castlemartin Meridian",
                "Manorbier Meridian",
                "Camarthan Bay Meridian",
                "Rhosilli Meridian",
                "Bristol Channel Meridian",
                "Porthcawl Meridian",
                "Pennlyn Meridian",
                "Cardiff Meridian",
                "Mouth of the River Meridian",
                "Portishead Meridian",
                "Soundwell Meridian",
                "Ford Meridian",
                "Hilmarton Meridian",
                "Marlborough Meridian",
                "Woodlands St. Mary Meridian",
                "Reading Meridian",
                "Stanwell Meridian",
                "Barnes Meridian",
                "Greenwich Meridian",
                "Purfleet-on-Thames Meridian",
                "Cliffe Meridian",
                "Thames Meridia",
                "Yorkletts Meridian",
                "St Nicholas at Wade Meridian",
                "Hollesley Bay Meridian", 
                "Thetford Meridian",
                "Norwich Meridian",
                "Lowestoft Meridian",
            ]

            let hovering2 = false;

            let lines = document.querySelectorAll('.cls-1');
            let segments = document.querySelectorAll('.cls-2');
            console.log(segments)
            let data = document.querySelector('.data');

            for(let i = 21; i < lines.length; i++) {

                let line = lines[i];
                line.addEventListener('mouseenter', (e) => {
                    if(names[i-21] != 'undefined' && names[i-21] != null) {
                        data.innerHTML = names[i-21];
                        hovering2 = true;
                    }
                   
                });

                line.addEventListener('mouseleave', (e) => {
                    data.innerHTML = '';
                    hovering2 = false;
                });

            }

            let london = 8;
            let hovering1 = false;

            for(let i = 0; i<segments.length ; i++) {

                let segment = segments[i];

                segment.addEventListener('mouseenter', (e) => {
                    if(i < london) {
                        data.innerHTML = 'GMT+' + (london-i);
                    } else if(i > london) {
                        data.innerHTML = 'GMT '+ (london-i);
                    } else {
                        data.innerHTML = 'GMT';
                    }
                    segment.style.opacity = 1;
                    hovering1 = true
                });

                segment.addEventListener('mouseleave', (e) => {
                    data.innerHTML = '';
                    segment.style.opacity = 0;
                    hovering1 = false;
                });

            }

            document.addEventListener('mousemove', (e) => {
                data.style.left = e.pageX + 'px'
                data.style.top = e.pageY + 'px'
                if(hovering1 || hovering2) {
                    data.style.display = 'block'
                } else if(!hovering1 && !hovering2) {
                    data.style.display = 'none'
                }
            })

        </script>
