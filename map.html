<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body { margin: 0; height: 100%; }
    #map { height: 100vh; width: 100%; }
    pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
    .container { position:fixed; bottom:0px; left: 0px; width:100%;
    padding:20px; display: flex; gap:20px; z-index:9999}

    .popup-card {
    font-family: system-ui, sans-serif;
    min-width: 200px;
    }

    .popup-card .header {
    font-weight: 600;
    margin-bottom: 10px;
    }

    .popup-card .item {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
    }

    .popup-card .icon {
    font-size: 16px;
    }

    .popup-card .label {
    font-size: 12px;
    color: #777;
    }

    .popup-card .value {
    font-weight: 500;
    }

  </style>
  
</head>
<body>

       <div class="container">

         
            <button class="updateBtn">UPDATE</button>

        </div>

  <div id="map"></div>

 <script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

    <script>
        const map = L.map("map").setView([51.5, -0.12], 5);

        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: "&copy; OpenStreetMap contributors"
        }).addTo(map);

        let marker;

        async function loadData() {
            const res = await fetch("https://my-json-board.sam-e53.workers.dev/api/data");
            const payload = await res.json();

            const data = payload.data.message;
            const time = payload.updated_at;

            const d = new Date(time);

            const nice =
            d.getDate().toString().padStart(2, "0") + "/" +
            (d.getMonth() + 1).toString().padStart(2, "0") + "/" +
            d.getFullYear() + " " +
            d.getHours().toString().padStart(2, "0") + ":" +
            d.getMinutes().toString().padStart(2, "0");
            // const lat = data.lat;
            // const lon = data.lon;

            const popupHtml = `

                    <div class="item">
                        <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M474.6 188.1C495.3 203.7 520.6 218.8 548.8 222.6C561.9 224.4 574 215.1 575.8 202C577.6 188.9 568.3 176.8 555.2 175C539.3 172.9 522 163.7 503.5 149.8C465.1 120.8 413 120.8 374.5 149.8C350.5 167.9 333.8 176.1 320 176.1C306.2 176.1 289.5 167.9 265.5 149.8C227.1 120.8 175 120.8 136.5 149.8C118 163.7 100.7 172.9 84.8 175C71.7 176.8 62.4 188.8 64.2 202C66 215.2 78 224.4 91.2 222.6C119.4 218.8 144.8 203.7 165.4 188.1C186.7 172 215.3 172 236.6 188.1C260.8 206.4 288.9 224 320 224C351.1 224 379.1 206.3 403.4 188.1C424.7 172 453.3 172 474.6 188.1zM474.6 332.1C495.3 347.7 520.6 362.8 548.8 366.6C561.9 368.4 574 359.1 575.8 346C577.6 332.9 568.3 320.8 555.2 319C539.3 316.9 522 307.7 503.5 293.8C465.1 264.8 413 264.8 374.5 293.8C350.5 311.9 333.8 320.1 320 320.1C306.2 320.1 289.5 311.9 265.5 293.8C227.1 264.8 175 264.8 136.5 293.8C118 307.7 100.7 316.9 84.8 319C71.7 320.7 62.4 332.8 64.2 346C66 359.2 78 368.4 91.2 366.6C119.4 362.8 144.8 347.7 165.4 332.1C186.7 316 215.3 316 236.6 332.1C260.8 350.4 288.9 368 320 368C351.1 368 379.1 350.3 403.4 332.1C424.7 316 453.3 316 474.6 332.1zM403.4 476.1C424.7 460 453.3 460 474.6 476.1C495.3 491.7 520.6 506.8 548.8 510.6C561.9 512.4 574 503.1 575.8 490C577.6 476.9 568.3 464.8 555.2 463C539.3 460.9 522 451.7 503.5 437.8C465.1 408.8 413 408.8 374.5 437.8C350.5 455.9 333.8 464.1 320 464.1C306.2 464.1 289.5 455.9 265.5 437.8C227.1 408.8 175 408.8 136.5 437.8C118 451.7 100.7 460.9 84.8 463C71.7 464.8 62.4 476.8 64.2 490C66 503.2 78 512.4 91.2 510.6C119.4 506.8 144.8 491.7 165.4 476.1C186.7 460 215.3 460 236.6 476.1C260.8 494.4 288.9 512 320 512C351.1 512 379.1 494.3 403.4 476.1z"/></svg></div>
                    <div>
                        <div class="label">Level</div>
                        <div class="value">${data.message}</div>
                    </div>
                    </div>

                    <div class="item">
                        <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M528 320C528 434.9 434.9 528 320 528C205.1 528 112 434.9 112 320C112 205.1 205.1 112 320 112C434.9 112 528 205.1 528 320zM64 320C64 461.4 178.6 576 320 576C461.4 576 576 461.4 576 320C576 178.6 461.4 64 320 64C178.6 64 64 178.6 64 320zM296 184L296 320C296 328 300 335.5 306.7 340L402.7 404C413.7 411.4 428.6 408.4 436 397.3C443.4 386.2 440.4 371.4 429.3 364L344 307.2L344 184C344 170.7 333.3 160 320 160C306.7 160 296 170.7 296 184z"/></svg></div>
                    <div>
                        <div class="label">Last updated</div>
                        <div class="value">${formatDate(payload.updated_at)}</div>
                    </div>
                    </div>
                </div>
                `;

            if (marker) {
                marker.setPopupContent(popupHtml);
            } else {
                marker = L.marker([51.5, -0.12]).addTo(map).bindPopup(popupHtml);
                map.setView([51.5, -0.12], 13);
            }

            updateBtn.disabled = false;
        }

        function escapeHtml(str) {
            return str
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;");
        }

        loadData();

        let updateBtn = document.querySelector('.updateBtn')

        updateBtn.addEventListener('click', function() {
            updateBtn.disabled = true;
            loadData();
        })
    
    </script>
</body>
</html>
