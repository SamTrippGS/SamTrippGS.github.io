<!doctype html>
<html lang="en">
<head>

  <title>Map</title>

  <link

  <style>
    html, body { margin: 0; height: 100%; font-family: sans-serif;}
    #map { height: 100vh; width: 100%; }
    pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
    .container { position:fixed; bottom:0px; left: 0px; width:100%;
    padding:20px; display: flex; gap:20px; z-index:9999}

    .popup-card {
    font-family: system-ui, sans-serif;
    min-width: 200px;
    }

    .popup-card .header {
    font-weight: 600;
    margin-bottom: 10px;
    }

    .popup-card .item {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
    }

    .popup-card .icon {
    font-size: 16px;
    }

    .popup-card .label {
    font-size: 12px;
    color: #777;
    }

    .popup-card .value {
    font-weight: 500;
    }

    svg {
        width:20px;
    }

    .header {
        display:flex;
        width:100%;
        gap:4px;
        align-items: center;
    }

    .updateBtn {
        background:#41eab4;
        padding:10px 20px;
        border-radius: 1000px;
        display: flex;
        align-items: center;
        gap:4px;
        box-shadow: 0 0 10px rgba(0,0,0,0.14);
        -webkit-appearance: none;
        cursor: pointer;
        transition: background 0.1s linear, transform 0.1s ease-out, box-shadow 0.1s ease-out;
        border:solid black 2px;
    }

     .updateBtn:hover {
        background:#e1e3e3;
        transform: translateY(-2px);
        box-shadow: 0 5px 0px rgba(0,0,0,1);
    }

    .updateBtn:active {
        background:#e1e3e3;
        transform: translateY(0px);
        box-shadow: 0 0 10px rgba(0,0,0,0.14);
    }

    header {
        position:fixed;
        top:0px;
        right:0px;
        padding:20px;
        width:fit-content;
        display: flex;
        align-items: center;
        gap:10px
    }
    .inner {
        background:#fafcfc;
        padding:10px 24px;
        width:100%;
        border-radius: 5px;
        box-shadow: 0 0 10px rgba(0,0,0,0.14);
        white-space: nowrap;
    }
  </style>
  
</head>
